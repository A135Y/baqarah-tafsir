# Netlify configuration for the Baqarah Tafsir Journal
# The app is a single self-contained index.html, so there is no build step.

[build]
  # No build command — we publish the repository root as-is.
  publish = "."
  command = ""

# Serve index.html for any path so deep links / refreshes always load the app.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Reasonable security headers for a static page.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
