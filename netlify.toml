# Netlify configuration for the Baqarah Tafsir Journal
# The app is a single self-contained index.html, so there is no build step.

[build]
  # No build command — we publish the repository root as-is.
  publish = "."
  command = ""

# Serve index.html for any path so deep links / refreshes always load the app.
# (Real files like /sw.js, /manifest.json and the icons are served directly;
# this rewrite only applies to paths that don't match a file.)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Reasonable security headers for a static page.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# The service worker and manifest must not be cached long, so app updates reach
# users promptly (the service worker then manages caching of everything else).
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache"
